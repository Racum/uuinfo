name: Release

on:
  push:
    branches:
      - release

permissions:
  contents: write

jobs:
  # ── Version guard ─────────────────────────────────────────────────────────

  check-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get-version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - name: Validate version and prepare draft release
        id: get-version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(cargo metadata --no-deps --format-version 1 | jq -r '.packages[0].version')
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

          # Fail only if a *published* (non-draft) release exists for this version
          if gh release view "v${VERSION}" --repo racum/uuinfo --json isDraft -q .isDraft 2>/dev/null | grep -q false; then
            echo "Release v${VERSION} already published. Bump version in Cargo.toml first."
            exit 1
          fi

          # Reuse existing draft if present (retry of failed run), otherwise create one
          if gh release view "v${VERSION}" --repo racum/uuinfo > /dev/null 2>&1; then
            echo "Draft v${VERSION} exists from previous run — reusing."
          else
            gh release create "v${VERSION}" --draft --title "v${VERSION}" --generate-notes
          fi

  # ── macOS builds ──────────────────────────────────────────────────────────

  build-macos-x86:
    needs: check-version
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin
      - run: cargo build --release --target x86_64-apple-darwin
      - uses: actions/upload-artifact@v4
        with:
          name: uuinfo-x86_64-apple-darwin
          path: target/x86_64-apple-darwin/release/uuinfo

  build-macos-arm64:
    needs: check-version
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin
      - run: cargo build --release --target aarch64-apple-darwin
      - uses: actions/upload-artifact@v4
        with:
          name: uuinfo-aarch64-apple-darwin
          path: target/aarch64-apple-darwin/release/uuinfo

  build-macos-universal:
    needs: [check-version, build-macos-x86, build-macos-arm64]
    runs-on: macos-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: uuinfo-x86_64-apple-darwin
          path: x86_64
      - uses: actions/download-artifact@v4
        with:
          name: uuinfo-aarch64-apple-darwin
          path: arm64
      - name: Create universal binary
        env:
          VERSION: ${{ needs.check-version.outputs.version }}
        run: |
          lipo -create -output uuinfo x86_64/uuinfo arm64/uuinfo
          chmod +x uuinfo
          tar czf uuinfo-macos-v${VERSION}.tar.gz uuinfo
      - name: Upload to GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.check-version.outputs.version }}
        run: |
          gh release upload "v${VERSION}" uuinfo-macos-v${VERSION}.tar.gz

  # ── Linux builds ──────────────────────────────────────────────────────────

  build-linux-amd64:
    needs: check-version
    runs-on: ubuntu-latest
    env:
      RUSTFLAGS: "-C target-feature=+crt-static"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl
      - run: sudo apt-get update && sudo apt-get install -y musl-tools
      - uses: cargo-bins/cargo-binstall@main
      - run: cargo binstall --no-confirm cargo-deb
      - run: cargo build --release --target x86_64-unknown-linux-musl
      - run: cargo deb --no-build --target x86_64-unknown-linux-musl
      - name: Upload .deb and raw static binary
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.check-version.outputs.version }}
        run: |
          cp target/x86_64-unknown-linux-musl/debian/uuinfo_${VERSION}_amd64.deb uuinfo_${VERSION}_amd64.deb
          gh release upload "v${VERSION}" uuinfo_${VERSION}_amd64.deb

          tar czf uuinfo-linux-x86_64.tar.gz \
            -C target/x86_64-unknown-linux-musl/release uuinfo
          gh release upload "v${VERSION}" uuinfo-linux-x86_64.tar.gz
      - uses: actions/upload-artifact@v4
        with:
          name: deb-amd64
          path: target/x86_64-unknown-linux-musl/debian/*.deb

  build-linux-arm64:
    needs: check-version
    runs-on: ubuntu-24.04-arm
    env:
      RUSTFLAGS: "-C target-feature=+crt-static"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-musl
      - run: sudo apt-get update && sudo apt-get install -y musl-tools
      - uses: cargo-bins/cargo-binstall@main
      - run: cargo binstall --no-confirm cargo-deb
      - run: cargo build --release --target aarch64-unknown-linux-musl
      - run: cargo deb --no-build --target aarch64-unknown-linux-musl
      - name: Upload .deb and raw static binary
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.check-version.outputs.version }}
        run: |
          cp target/aarch64-unknown-linux-musl/debian/uuinfo_${VERSION}_arm64.deb uuinfo_${VERSION}_arm64.deb
          gh release upload "v${VERSION}" uuinfo_${VERSION}_arm64.deb

          tar czf uuinfo-linux-aarch64.tar.gz \
            -C target/aarch64-unknown-linux-musl/release uuinfo
          gh release upload "v${VERSION}" uuinfo-linux-aarch64.tar.gz
      - uses: actions/upload-artifact@v4
        with:
          name: deb-arm64
          path: target/aarch64-unknown-linux-musl/debian/*.deb

  # ── APT repo update ───────────────────────────────────────────────────────

  update-apt-repo:
    needs: [check-version, build-linux-amd64, build-linux-arm64]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout racum/apt
        uses: actions/checkout@v4
        with:
          repository: racum/apt
          token: ${{ secrets.APT_REPO_TOKEN }}
          path: apt-repo
      - uses: actions/download-artifact@v4
        with:
          name: deb-amd64
          path: debs
      - uses: actions/download-artifact@v4
        with:
          name: deb-arm64
          path: debs
      - name: Import GPG key
        run: echo "${{ secrets.APT_SIGNING_KEY }}" | gpg --batch --import
      - name: Update APT repo
        env:
          APT_SIGNING_KEY_ID: ${{ secrets.APT_SIGNING_KEY_ID }}
        run: |
          sudo apt-get install -y apt-utils
          cp debs/*_amd64.deb apt-repo/pool/main/amd64/
          cp debs/*_arm64.deb apt-repo/pool/main/arm64/
          cd apt-repo
          bash scripts/update-apt-repo.sh
      - name: Commit and push
        env:
          VERSION: ${{ needs.check-version.outputs.version }}
        run: |
          cd apt-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "uuinfo v${VERSION}"
          git push

  # ── Homebrew formula update ───────────────────────────────────────────────

  update-homebrew:
    needs: [check-version, build-macos-universal]
    runs-on: ubuntu-latest
    steps:
      - name: Get SHA256 of universal binary
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.check-version.outputs.version }}
        run: |
          gh release download "v${VERSION}" \
            --repo racum/uuinfo \
            --pattern "uuinfo-macos-v${VERSION}.tar.gz"
          echo "SHA256=$(sha256sum uuinfo-macos-v${VERSION}.tar.gz | cut -d' ' -f1)" >> $GITHUB_ENV
      - name: Checkout homebrew-tap
        uses: actions/checkout@v4
        with:
          repository: racum/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap
      - name: Update formula
        env:
          VERSION: ${{ needs.check-version.outputs.version }}
        run: |
          sed -i "s/version \".*\"/version \"${VERSION}\"/" homebrew-tap/Formula/uuinfo.rb
          sed -i "s/sha256 \".*\"/sha256 \"${SHA256}\"/" homebrew-tap/Formula/uuinfo.rb
      - name: Commit and push
        env:
          VERSION: ${{ needs.check-version.outputs.version }}
        run: |
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/uuinfo.rb
          git commit -m "uuinfo v${VERSION}"
          git push

  # ── Publish draft release ─────────────────────────────────────────────────

  publish-release:
    needs: [check-version, update-apt-repo, update-homebrew]
    runs-on: ubuntu-latest
    steps:
      - name: Promote draft to published
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.check-version.outputs.version }}
        run: |
          gh release edit "v${VERSION}" --repo racum/uuinfo --draft=false
